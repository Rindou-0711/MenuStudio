<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Swim Menu Studio</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @page {
            size: landscape;
            margin: 1cm;
        }
        @media print {
            .no-print { display: none !important; }
            body { background: white; padding: 0; }
            .page-container { box-shadow: none; width: 100%; max-width: 100%; padding: 0; }
            table { border-collapse: collapse; width: 100%; table-layout: fixed; }
            input, select { -webkit-print-color-adjust: exact; print-color-adjust: exact; border: 1px solid #94a3b8 !important; }
            .bg-teal-50 { background-color: #f0fdfa !important; -webkit-print-color-adjust: exact; }
            .bg-teal-800 { background-color: #115e59 !important; -webkit-print-color-adjust: exact; color: white !important; }
        }
        /* 入力欄の高さを全体的に少し小さく調整 */
        input, select { background: transparent; padding: 2px 4px; text-align: center; border-radius: 4px; height: 28px; box-sizing: border-box; display: inline-block; vertical-align: middle; font-size: 12px; }
        input:focus, select:focus { outline: 2px solid #0f766e; }
        
        input::placeholder { text-align: center; vertical-align: middle; color: #94a3b8; }
        input[type="number"] { text-align: center; -moz-appearance: textfield; }
        input[type="number"]::-webkit-inner-spin-button, 
        input[type="number"]::-webkit-outer-spin-button { -webkit-appearance: none; margin: 0; }
    </style>
</head>
<body class="bg-slate-50 min-h-screen py-6">
    <div class="page-container max-w-4xl mx-auto bg-white p-6 shadow-xl border border-slate-100 rounded-2xl">
        <div class="no-print flex justify-between items-center mb-4 border-b-2 border-teal-50 pb-3">
            <h1 class="text-xl font-black text-teal-900 tracking-tight flex items-center gap-2">
                <span class="w-1.5 h-5 bg-teal-600 rounded-full"></span> Swim Menu Studio
            </h1>
            <button onclick="window.print()" class="bg-teal-700 text-white px-4 py-1.5 rounded-lg font-bold hover:bg-teal-800 transition text-sm">PDFで保存</button>
        </div>

        <div class="header-grid grid grid-cols-1 md:grid-cols-3 gap-3 mb-4 bg-teal-50 p-3 rounded-xl border border-teal-100">
            <div>
                <label class="block text-[9px] font-bold text-teal-700 uppercase tracking-wider mb-0.5">Title</label>
                <input type="text" id="menuTitle" placeholder="Menu Title" class="w-full text-base font-bold border border-teal-200 outline-none text-center bg-white h-9">
            </div>
            <div>
                <label class="block text-[9px] font-bold text-teal-700 uppercase tracking-wider mb-0.5">Made By</label>
                <input type="text" id="authorName" placeholder="Name" class="w-full text-sm border border-teal-200 outline-none text-center bg-white h-9">
            </div>
            <div>
                <label class="block text-[9px] font-bold text-teal-700 uppercase tracking-wider mb-0.5">Date</label>
                <input type="date" id="menuDate" class="w-full text-sm border border-teal-200 outline-none text-center bg-white h-9">
            </div>
        </div>
        
        <div class="mb-4 px-1">
            <label class="block text-[9px] font-bold text-slate-500 uppercase tracking-wider mb-0.5">Today's Targets</label>
            <input type="text" placeholder="Enter your goals for today" class="w-full text-xs border border-slate-300 outline-none p-1.5 text-slate-700 bg-white h-9">
        </div>

        <table class="w-full border-separate border-spacing-0 border border-slate-200 rounded-lg overflow-hidden text-xs">
            <thead class="bg-teal-800 text-white">
                <tr>
                    <th class="p-1.5 text-center text-[9px] font-bold uppercase tracking-wider">Type</th>
                    <th class="p-1.5 text-center text-[9px] font-bold uppercase tracking-wider">距離 × 本数 × セット</th>
                    <th class="p-1.5 text-center text-[9px] font-bold uppercase tracking-wider">Cycle</th>
                    <th class="p-1.5 text-center text-[9px] font-bold uppercase tracking-wider">Style</th>
                    <th class="p-1.5 text-center text-[9px] font-bold uppercase tracking-wider">Description</th>
                    <th class="p-1.5 text-right text-[9px] font-bold uppercase tracking-wider">合計距離</th>
                    <th class="p-1.5 text-right text-[9px] font-bold uppercase tracking-wider">累積距離</th>
                    <th class="no-print p-1.5"></th>
                </tr>
            </thead>
            <tbody id="menuBody" class="text-slate-700"></tbody>
        </table>

        <button onclick="addRow()" class="no-print mt-3 flex items-center gap-1.5 text-teal-700 font-bold hover:text-teal-900 border-2 border-dashed border-teal-200 px-3 py-1 rounded-lg w-full justify-center hover:bg-teal-50 transition text-xs">
            + 行を追加
        </button>
        
        <div class="mt-4 flex justify-end items-end gap-2">
            <span class="text-slate-400 font-bold uppercase tracking-wider text-[10px] mb-1">Total Distance</span>
            <span id="totalDistance" class="text-3xl font-black text-teal-700">0</span>
            <span class="text-lg font-black text-teal-600 mb-1">m</span>
        </div>
    </div>

    <script>
        document.getElementById('menuDate').valueAsDate = new Date();
        const types = ["W-up", "Kick", "Pull", "Drill", "Swim", "Main", "Down", "Loosen", "Others"];

        function addRow() {
            const tr = document.createElement('tr');
            tr.className = "border-b border-slate-100 hover:bg-teal-50/30 transition";
            tr.innerHTML = `
                <td class="p-1 text-center"><select class="w-16 border border-slate-200 rounded text-[11px] bg-white h-7 text-center">${types.map(t => `<option>${t}</option>`).join('')}</select></td>
                <td class="p-1 flex gap-0.5 items-center justify-center text-xs">
                    <input type="number" class="w-10 border border-slate-200 rounded text-center bg-white h-7" oninput="calculate()" placeholder="距離">
                    <span class="text-slate-300 font-bold px-0.5">×</span>
                    <input type="number" class="w-8 border border-slate-200 rounded text-center bg-white h-7" oninput="calculate()" placeholder="本数">
                    <span class="text-slate-300 font-bold px-0.5">×</span>
                    <input type="number" class="w-8 border border-slate-200 rounded text-center bg-white h-7" oninput="calculate()" placeholder="セット">
                </td>
                <td class="p-1 text-center"><input type="text" placeholder="m:s" class="w-12 border border-slate-200 rounded text-[11px] bg-white h-7 text-center"></td>
                <td class="p-1 text-center"><input type="text" placeholder="Style" class="w-16 border border-slate-200 rounded text-[11px] bg-white h-7 text-center"></td>
                <td class="p-1 text-center"><input type="text" placeholder="Description" class="w-full border border-slate-200 rounded text-[11px] bg-white h-7 text-center"></td>
                <td class="subtotal p-1.5 text-right font-bold text-teal-800 text-[11px]">0</td>
                <td class="cumulative p-1.5 text-right font-bold text-slate-900 text-[11px]">0</td>
                <td class="no-print p-1.5 text-center"><button onclick="this.closest('tr').remove(); calculate()" class="text-slate-300 hover:text-red-500 transition">✕</button></td>
            `;
            document.getElementById('menuBody').appendChild(tr);
        }

        function calculate() {
            let total = 0;
            const rows = document.querySelectorAll('#menuBody tr');
            rows.forEach(row => {
                const inputs = row.querySelectorAll('input[type="number"]');
                const sub = (parseInt(inputs[0].value) || 0) * (parseInt(inputs[1].value) || 0) * (parseInt(inputs[2].value) || 0);
                row.querySelector('.subtotal').innerText = sub;
                total += sub;
                row.querySelector('.cumulative').innerText = total;
            });
            document.getElementById('totalDistance').innerText = total;
        }

        for(let i=0; i<3; i++) addRow();
    </script>
</body>
</html>
